name: 周回顾
on:
  schedule:
    - cron: '30 2 * * 0'
  workflow_dispatch:
jobs:
  weekly-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 执行
        env:
          IMA_OPENAPI_CLIENTID: ${{ secrets.IMA_OPENAPI_CLIENTID }}
          IMA_OPENAPI_APIKEY: ${{ secrets.IMA_OPENAPI_APIKEY }}
        run: cd kb-reminder && python3 weekly_wrapup.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-${{ github.run_id }}
          path: kb-reminder/outputs/

