name: 夜间入库

on:
  schedule:
    - cron: '10 16 * * *'   # 每天 00:10 UTC+8 = 16:10 UTC (前一天的16:10)
  workflow_dispatch:

jobs:
  nightly-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行夜间入库
        env:
          IMA_OPENAPI_CLIENTID: ${{ secrets.IMA_OPENAPI_CLIENTID }}
          IMA_OPENAPI_APIKEY: ${{ secrets.IMA_OPENAPI_APIKEY }}
        run: python kb_reminder.py nightly

      - name: 上传评分档案
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-evaluation-${{ github.run_id }}
          path: outputs/
